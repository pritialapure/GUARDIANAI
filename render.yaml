services:
  - type: web
    name: guardian-council-ai-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: EMBEDDING_PROVIDER
        value: huggingface
      - key: ALLOWED_ORIGINS
        sync: false
      - key: APP_ENV
        value: production
